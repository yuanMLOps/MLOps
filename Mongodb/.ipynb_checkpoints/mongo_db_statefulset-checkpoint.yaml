
# namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: mongo-db

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-root
  namespace: mongo-db
  labels:
    app: mongodb
type: Opaque
stringData:
  username: admin   # <-- change me
  password: admin   # <-- change me

---
# mongodb-headless-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: mongo-db
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# mongodb-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: mongo-db
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8.0.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  key: username
                  name: mongodb-root
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: mongodb-root
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# mongodb-0-nodeport.yaml
apiVersion: v1
kind: Service
metadata:
  name: mongodb-0-svc
  namespace: mongo-db
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: mongodb-0
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 32001

